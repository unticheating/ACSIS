<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher Portal – Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Component Styles (standalone files) -->
  <link rel="stylesheet" href="sidebar.css">
  <link rel="stylesheet" href="navbar.css">

  <!-- Page Styles -->
  <link rel="stylesheet" href="teacher_dashboard.css">
</head>
<body>

<div class="page-wrapper">

  <!-- =====================
       SIDEBAR COMPONENT
       (Paste sidebar.html content here, or load via JS include)
       ===================== -->
  <aside class="sidebar" id="main-sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="sidebar-brand-avatar">T</div>
      <div class="sidebar-brand-info">
        <span class="sidebar-brand-name">Teacher</span>
        <span class="sidebar-brand-role">Portal</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">

      <a href="teacher_dashboard.html" class="sidebar-link active" data-page="teacher_dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Dashboard
      </a>

      <a href="create_exam.html" class="sidebar-link" data-page="create_exam">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
        Create Exam
      </a>

      <a href="my_exams.html" class="sidebar-link" data-page="my_exams">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <path d="M9 12h6M9 16h4"/>
        </svg>
        My Exams
      </a>

      <a href="live_monitoring.html" class="sidebar-link" data-page="live_monitoring">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Live Monitoring
      </a>

    </nav>

    <!-- Logout -->
    <div class="sidebar-footer">
      <button class="sidebar-logout" onclick="handleLogout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </div>

  </aside>
  <!-- END SIDEBAR -->


  <!-- =====================
       NAVBAR COMPONENT
       (Paste navbar.html content here, or load via JS include)
       ===================== -->
  <nav class="navbar" id="main-navbar">
    <div class="navbar-left">
      <span class="navbar-title">Prof. Juan Dela Cruz</span>
      <span class="navbar-subtitle">Welcome back, Teacher</span>
    </div>
    <div class="navbar-right">
      <button class="navbar-bell" title="Notifications" aria-label="Notifications">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <div class="navbar-avatar" title="Teacher Profile">T</div>
    </div>
  </nav>
  <!-- END NAVBAR -->


  <!-- =====================
       MAIN CONTENT AREA
       ===================== -->
  <main class="main-content">

    <!-- Stats Cards -->
    <div class="stats-grid">

      <!-- My Exams -->
      <div class="stat-card">
        <div class="stat-card-body">
          <span class="stat-card-label">My Exams</span>
          <span class="stat-card-value">0</span>
        </div>
        <div class="stat-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
      </div>

      <!-- Active Exams -->
      <div class="stat-card">
        <div class="stat-card-body">
          <span class="stat-card-label">Active Exams</span>
          <span class="stat-card-value">0</span>
        </div>
        <div class="stat-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
      </div>

      <!-- Total Students -->
      <div class="stat-card">
        <div class="stat-card-body">
          <span class="stat-card-label">Total Students</span>
          <span class="stat-card-value">1</span>
        </div>
        <div class="stat-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
      </div>

    </div>
    <!-- END Stats Cards -->

  </main>
  <!-- END MAIN CONTENT -->

</div>
<!-- END PAGE WRAPPER -->


<script>
  // Auto-highlight active sidebar link based on current page
  (function() {
    const links = document.querySelectorAll('.sidebar-link[data-page]');
    const currentPage = window.location.pathname.split('/').pop().replace('.html', '');
    links.forEach(link => {
      link.classList.remove('active');
      if (link.dataset.page === currentPage) {
        link.classList.add('active');
      }
    });
  })();

  function handleLogout() {
    if (confirm('Are you sure you want to logout?')) {
      window.location.href = 'index.html';
    }
  }
</script>

</body>
</html>
