<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detections - Teacher Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidebar.css" />
  <link rel="stylesheet" href="navbar.css" />
  <link rel="stylesheet" href="detections.css" />
</head>
<body>
  <div class="page-wrapper">
    <aside class="sidebar" id="main-sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-avatar">T</div>
        <div class="sidebar-brand-info">
          <span class="sidebar-brand-name">Teacher</span>
          <span class="sidebar-brand-role">Portal</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="teacher_dashboard.html" class="sidebar-link" data-page="dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect>
          </svg> Dashboard
        </a>
        <a href="create_exam.html" class="sidebar-link" data-page="create-exam">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line>
          </svg> Create Exam
        </a>
        <a href="my_exams.html" class="sidebar-link" data-page="my-exams">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"></path><rect x="9" y="3" width="6" height="4" rx="1"></rect><path d="M9 12h6M9 16h4"></path>
          </svg> My Exams
        </a>
        <a href="detections.html" class="sidebar-link active" data-page="detections">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg> Detections
        </a>
        <a href="reports.html" class="sidebar-link" data-page="reports">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line>
          </svg> Reports
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="sidebar-logout" onclick="handleLogout()">Logout</button>
      </div>
    </aside>

    <nav class="navbar" id="main-navbar">
      <div class="navbar-left">
        <span class="navbar-title">Prof. Juan Dela Cruz</span>
        <span class="navbar-subtitle">Welcome back, Teacher</span>
      </div>
      <div class="navbar-right">
        <div class="navbar-avatar">T</div>
      </div>
    </nav>

    <main class="main-content">
      <div class="container">
        
        <div class="stats-grid-4">
          <div class="stat-card">
            <span class="stat-title">Still Answering</span>
            <span class="stat-value" id="stat-answering">1</span>
          </div>
          <div class="stat-card">
            <span class="stat-title">Completed</span>
            <span class="stat-value" id="stat-completed">1</span>
          </div>
          <div class="stat-card">
            <span class="stat-title">Highest Score</span>
            <span class="stat-value" id="stat-highest">50%</span>
            <div class="stat-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </div>
          </div>
          <div class="stat-card">
            <span class="stat-title">Timer</span>
            <span class="stat-value" id="stat-timer">00:00</span>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <svg class="panel-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            <span class="panel-title">Alerts</span>
          </div>
          <div class="empty-alerts" id="alerts-container">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            <p>No violations detected. All students are following exam rules.</p>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Live Status</span>
          </div>
          <div class="live-status-grid" id="live-status-container">
            </div>
        </div>

      </div>
    </main>
  </div>
  <script src="detections.js"></script>
</body>
</html>
