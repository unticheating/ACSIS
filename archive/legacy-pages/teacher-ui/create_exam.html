  <main class="main-content">
  <div class="container">
    <h1 class="page-title">Create New Examination</h1>

    <!-- Exam Details -->
    <div class="card">
      <h2 class="section-title">Exam Details</h2>
      <div class="form-grid">
        <div class="form-group full">
          <label>Exam Title</label>
          <input type="text" id="exam-title" />
        </div>

        <div class="form-group">
          <label>Subject</label>
          <select id="subject">
            <option value="" selected>Select subject</option>
            <option>Data Structures (CS101)</option>
            <option>Networking II (CS604)</option>
            <option>Introduction to Java (CS432)</option>
          </select>
        </div>

        <div class="form-group">
          <label>Time Limit (minutes)</label>
          <div class="time-input-group">
            <input type="number" id="time-limit" min="1" readonly onclick="showTimePicker()" />
            <span class="material-icons time-icon">schedule</span>
          </div>
        </div>

        <div class="form-group">
          <label>Year Level</label>
          <select id="year-level">
            <option value="" selected>Select year level</option>
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
            <option>4th Year</option>
          </select>
        </div>

        <div class="form-group">
          <label>Section</label>
          <select id="section">
            <option value="" selected>Select section</option>
            <option>A</option>
            <option>B</option>
            <option>C</option>
            <option>D</option>
            <option>E</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Add Question -->
    <div class="card">
      <h2 class="section-title">Add Question</h2>

      <div class="form-group">
        <label>Question Type</label>
        <select id="question-type" onchange="changeQuestionType()">
          <option value="" selected>Select question type</option>
          <option value="multiple">Multiple Choice</option>
          <option value="identification">Identification</option>
          <option value="truefalse">True / False</option>
        </select>
      </div>

      <div class="form-group">
        <label>Question</label>
        <textarea id="question-text" rows="3" class="question-textarea"></textarea>
      </div>

      <div id="options-area"></div>

      <button class="add-btn" onclick="addQuestion()">
        <span class="material-icons">add</span>
        Add Question
      </button>
    </div>

    <!-- Questions List -->
    <div class="card" id="questions-list-card" style="display: none;">
      <div class="questions-header">
        <h2>Questions (<span id="question-count">0</span>)</h2>
        <button class="shuffle-btn" onclick="shuffleQuestions()">
          <span class="material-icons">shuffle</span>
          Shuffle
        </button>
      </div>
      <div id="questions-list"></div>
    </div>

    <button class="create-exam-btn" onclick="createExam()">
      Create Exam
    </button>
  </div>
  </main>
  </div>

  <!-- Time Picker Modal -->
  <div id="time-picker-modal" class="modal">
    <div class="modal-content">
      <h3>Select Time Limit (minutes)</h3>
      
      <div class="time-picker-grid">
        <div class="column">
          <div class="picker-label">Hours</div>
          <div id="hours-list" class="number-list"></div>
        </div>
        <div class="column">
          <div class="picker-label">Minutes</div>
          <div id="minutes-list" class="number-list"></div>
        </div>
      </div>

      <div class="modal-buttons">
        <button onclick="hideTimePicker()" class="cancel-btn">CANCEL</button>
        <button onclick="saveTimeLimit()" class="save-btn">OK</button>
      </div>
    </div>
  </div>

  <script src="create_exam.js"></script>
</body>
</html>
