<!--
  sidebar.html
  Standalone fixed sidebar component.
  Include this on every page. Active link is managed via JS (data-page attribute).
  Requires: sidebar.css
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sidebar.css">

<aside class="sidebar" id="main-sidebar">

  <!-- Brand / Profile -->
  <div class="sidebar-brand">
    <div class="sidebar-brand-avatar">T</div>
    <div class="sidebar-brand-info">
      <span class="sidebar-brand-name">Teacher</span>
      <span class="sidebar-brand-role">Portal</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">

    <a href="teacher_dashboard.html" class="sidebar-link" data-page="dashboard">
      <!-- Dashboard icon -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Dashboard
    </a>

    <a href="create_exam.html" class="sidebar-link" data-page="create-exam">
      <!-- File/Exam icon -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <line x1="9" y1="15" x2="15" y2="15"/>
      </svg>
      Create Exam
    </a>

    <a href="my_exams.html" class="sidebar-link" data-page="my-exams">
      <!-- Clipboard icon -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <path d="M9 12h6M9 16h4"/>
      </svg>
      My Exams
    </a>

    <a href="live_monitoring.html" class="sidebar-link" data-page="live-monitoring">
      <!-- Activity / Live icon -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Live Monitoring
    </a>

  </nav>

  <!-- Footer: Logout -->
  <div class="sidebar-footer">
    <button class="sidebar-logout" onclick="handleLogout()">
      <!-- Logout icon -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>

</aside>

<script>
  // Auto-highlight active sidebar link based on current page filename
  (function() {
    const links = document.querySelectorAll('.sidebar-link[data-page]');
    const currentPage = window.location.pathname.split('/').pop().replace('.html', '');
    links.forEach(link => {
      const href = link.getAttribute('href') || '';
      const pageName = href.replace('.html', '');
      if (pageName === currentPage || link.dataset.page === currentPage) {
        link.classList.add('active');
      }
    });
  })();

  function handleLogout() {
    if (confirm('Are you sure you want to logout?')) {
      window.location.href = 'index.html';
    }
  }
</script>
