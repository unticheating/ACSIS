<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ACSIS — Anti-Cheating Student Integrity System. Secure online examination platform for academic institutions."
    />
    <meta name="google-site-verification" content="%VITE_GOOGLE_SITE_VERIFICATION%" />
    <title>ACSIS</title>
    <!-- Tab icon is set in main.jsx from brandAssets DOCUMENT_LOGO_SRC (do not add a static favicon here). -->
    <script>
      try {
        var d = localStorage.getItem('acsis-theme') !== 'light';
        if (d) document.documentElement.classList.add('dark');
        document.documentElement.style.backgroundColor = d ? '#0a0a0a' : '#DDEEE4';
      } catch (e) {
        document.documentElement.classList.add('dark');
        document.documentElement.style.backgroundColor = '#0a0a0a';
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>ACSIS is an online examination platform developed for academic use. JavaScript is required.</noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
